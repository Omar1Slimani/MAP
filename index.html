<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>⚡ TELECOM MAP</title>
  <meta name="description" content="تطبيق إدارة شبكة الاتصالات - MSAN, SR, PC" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Top Bar -->
  <div id="topbar">
    <span id="logo">⚡ TELECOM MAP</span>
    <div id="search-area">
      <input id="searchInput" placeholder="بحث عن MSAN أو constitution..." />
      <button id="searchBtn">🔍</button>
    </div>
    <button id="createBtn">➕ إنشاء</button>
  </div>

  <!-- Map -->
  <div id="map"></div>

  <!-- Picking coords banner -->
  <div id="pickBanner" class="hidden">📍 انقر على الخريطة لتحديد الإحداثيات</div>

  <!-- Modal overlay -->
  <div id="modal" class="hidden">
    <div id="modalContent"></div>
  </div>

  <!-- Search results overlay -->
  <div id="searchModal" class="hidden">
    <div id="searchContent"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
